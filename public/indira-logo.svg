<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 520" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&amp;display=swap');
      .brand-title {
        font-family: 'Montserrat', 'Century Gothic', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 88px;
        font-weight: 300;
        fill: #000000;
        letter-spacing: -0.5px;
      }
      .brand-subtitle {
        font-family: 'Montserrat', 'Century Gothic', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 26px;
        font-weight: 400;
        fill: #000000;
        letter-spacing: 13px;
      }
    </style>
  </defs>

  <!-- Top Solid Black Emblem Circle -->
  <circle cx="250" cy="140" r="105" fill="#000000" />

  <!-- Lotus Flower Dotted Emblem -->
  <!-- Center Magenta Petal (Pink Dotted) -->
  <path d="M 250 68 C 218 110, 218 165, 250 192 C 282 165, 282 110, 250 68 Z" 
        fill="none" stroke="#EC008C" stroke-width="3.5" stroke-dasharray="3.5,4.5" stroke-linecap="round" />

  <!-- Left White Petal (White Dotted) -->
  <path d="M 250 192 C 205 192, 142 155, 155 135 C 178 118, 225 150, 250 192 Z" 
        fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-dasharray="3.5,4.5" stroke-linecap="round" />

  <!-- Right White Petal (White Dotted) -->
  <path d="M 250 192 C 295 192, 358 155, 345 135 C 322 118, 275 150, 250 192 Z" 
        fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-dasharray="3.5,4.5" stroke-linecap="round" />

  <!-- Typography: indira® (Geometric Lowercase Sans-Serif as in Official Logo) -->
  <text x="250" y="352" text-anchor="middle" class="brand-title">indira<tspan font-size="28" font-weight="400" dy="-42">®</tspan></text>

  <!-- Typography: PHOTOGRAPHY -->
  <text x="256" y="428" text-anchor="middle" class="brand-subtitle">PHOTOGRAPHY</text>
</svg>
