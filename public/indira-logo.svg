<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <style>
      .brand-title { font-family: 'Playfair Display', 'Didot', 'Bodoni MT', serif; font-size: 82px; font-weight: 300; fill: #000000; letter-spacing: -1px; }
      .brand-subtitle { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 26px; font-weight: 400; fill: #000000; letter-spacing: 12px; }
      .brand-title-dark { fill: #FFFFFF; }
      .brand-subtitle-dark { fill: #FFFFFF; }
    </style>
  </defs>

  <!-- Black Emblem Circle -->
  <circle cx="250" cy="150" r="105" fill="#000000" />

  <!-- Lotus Flower Dotted Emblem -->
  <!-- Center Magenta Petal -->
  <path d="M 250 80 C 220 120, 220 170, 250 195 C 280 170, 280 120, 250 80 Z" 
        fill="none" stroke="#E6007E" stroke-width="3.5" stroke-dasharray="4,5" stroke-linecap="round" />

  <!-- Left White Petal -->
  <path d="M 250 195 C 200 195, 150 160, 160 140 C 180 125, 225 155, 250 195 Z" 
        fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-dasharray="4,5" stroke-linecap="round" />

  <!-- Right White Petal -->
  <path d="M 250 195 C 300 195, 350 160, 340 140 C 320 125, 275 155, 250 195 Z" 
        fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-dasharray="4,5" stroke-linecap="round" />

  <!-- Typography: indira® -->
  <text x="250" y="340" text-anchor="middle" class="brand-title">indira<tspan font-size="28" dy="-40">®</tspan></text>

  <!-- Typography: PHOTOGRAPHY -->
  <text x="256" y="410" text-anchor="middle" class="brand-subtitle">PHOTOGRAPHY</text>
</svg>
